<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AURA</title>
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <style>
      /* Smooth pulsing animations for your warm peach bubbles */
      @keyframes floatBubble1 {
        0%, 100% { transform: translateY(0px) scale(1); }
        50% { transform: translateY(-15px) scale(1.08); }
      }
      @keyframes floatBubble2 {
        0%, 100% { transform: translateY(0px) scale(1.05); }
        50% { transform: translateY(12px) scale(0.95); }
      }
      .animate-bubble-1 { animation: floatBubble1 8s ease-in-out infinite; }
      .animate-bubble-2 { animation: floatBubble2 10s ease-in-out infinite; }
    </style>
  </head>
  <body class="m-0 p-0 bg-[#fffcfb]">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
